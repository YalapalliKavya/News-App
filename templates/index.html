<!DOCTYPE html>
<html>
<head>
    <title>Personalized News Digest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>📰 Personalized News Digest</h2>

    <form method="POST">
        <input type="text" name="topic" placeholder="Enter topic (Sports, AI...)" required>
        <button type="submit">Generate Digest</button>
    </form>

    {% if digest %}
    <div class="result">
        <p><strong>Topic:</strong> {{ topic }}</p>
        <p><strong>Sources Used:</strong> AI Generated</p>
        <ul>
            {% for line in digest %}
                {% if line.strip() %}
                <li>{{ line }}</li>
                {% endif %}
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
